[book]
title = "Rust 패턴과 엔지니어링 활용 가이드"
authors = ["Rust Training Team"]
language = "ko"
src = "src"

[build]
build-dir = "book"

[output.html]
git-repository-url = "https://github.com/rust-systems-training/rust-training"
default-theme = "light"
preferred-dark-theme = "ayu"
additional-js = ["mermaid.min.js", "mermaid-init.js"]

[preprocessor.mermaid]
command = "mdbook-mermaid"

[output.html.playground]
editable = true
line-numbers = true
